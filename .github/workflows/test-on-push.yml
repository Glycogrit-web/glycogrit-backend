name: 🧪 Run Tests on Push

on:
  push:
    branches: [ master, main, staging, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'requirements-test.txt'
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 🧪 Run Unit Tests
        run: |
          pytest tests/unit/ -v --tb=short -m "not slow"

      - name: 🔗 Run Integration Tests
        run: |
          pytest tests/integration/ -v --tb=short

      - name: 🔒 Run Security Tests
        run: |
          pytest -v --tb=short -m security
        continue-on-error: true  # Optional until security tests are added

      - name: 📊 Generate Coverage Report
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term --cov-fail-under=70

      - name: 📈 Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: 💬 Comment Test Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results\n\n✅ All tests passed!\n\n### Coverage\n\`\`\`\n${coverage}\n\`\`\``
            });

  # Separate job for critical financial tests - MUST PASS before deployment
  financial-tests:
    name: 💰 Critical Financial Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 💰 Run ALL Financial Tests
        run: |
          pytest tests/ -v -m financial --tb=long
        continue-on-error: false

      - name: ❌ Fail if any financial test fails
        if: failure()
        run: |
          echo "::error::CRITICAL: Financial tests failed! DO NOT DEPLOY!"
          exit 1
