name: 🧪 CI/CD Pipeline

on:
  push:
    branches: [ master, main, staging, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'requirements-test.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ master, main, staging, develop ]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.10'
  MIN_COVERAGE: 70
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Code Quality Checks (Fast)
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install ruff black isort mypy bandit
          pip install -r requirements.txt

      - name: 🎨 Check code formatting (Black)
        run: black --check app/ tests/
        continue-on-error: true  # Warning only - code needs formatting

      - name: 📐 Check import sorting (isort)
        run: isort --check-only app/ tests/
        continue-on-error: true  # Warning only - code needs formatting

      - name: 🔍 Lint with Ruff
        run: ruff check app/ tests/
        continue-on-error: true  # Warning only - code needs cleanup

      - name: 🔒 Security check with Bandit
        run: bandit -r app/ -ll
        continue-on-error: true  # Warning only

      - name: 📝 Type checking with mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true  # Warning only

  # Job 2: Unit Tests (Fast, runs in parallel)
  unit-tests:
    name: 🧪 Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: code-quality

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 🧪 Run Unit Tests
        run: |
          pytest tests/unit/ -v --tb=short -m "not slow" --junitxml=junit-${{ matrix.python-version }}.xml
        continue-on-error: false

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit-${{ matrix.python-version }}.xml

  # Job 3: Integration Tests
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 🔗 Run Integration Tests
        run: |
          pytest tests/integration/ -v --tb=short --junitxml=junit-integration.xml
        continue-on-error: false

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: junit-integration.xml

  # Job 4: Financial Critical Tests (MUST PASS)
  financial-tests:
    name: 💰 Critical Financial Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 💰 Run ALL Financial Tests
        run: |
          pytest tests/ -v -m financial --tb=long --junitxml=junit-financial.xml
        continue-on-error: false

      - name: ❌ Block merge if financial tests fail
        if: failure()
        run: |
          echo "::error::CRITICAL: Financial tests failed! This PR cannot be merged."
          echo "::error::Please fix all financial test failures before merging."
          exit 1

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: financial-test-results
          path: junit-financial.xml

  # Job 5: Security Tests
  security-tests:
    name: 🔒 Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 🔒 Run Security Tests
        run: |
          pytest -v --tb=short -m security --junitxml=junit-security.xml
        continue-on-error: true  # Warning only until all tests are implemented

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: junit-security.xml

  # Job 6: Coverage Report
  coverage:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-tests, integration-tests]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 📊 Generate Coverage Report
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --cov-fail-under=${{ env.MIN_COVERAGE }}
        continue-on-error: false

      - name: 📈 Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: 📦 Upload HTML Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: 💬 Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

  # Job 7: All Tests Status Check (Required for merge)
  all-tests-pass:
    name: ✅ All Required Tests Passed
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests, financial-tests, coverage]
    if: always()

    steps:
      - name: ✅ Check if all required jobs passed
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]]; then
            echo "::warning::Code quality checks failed - please format code"
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "::error::Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.financial-tests.result }}" != "success" ]]; then
            echo "::error::CRITICAL: Financial tests failed - CANNOT MERGE"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "::error::Coverage requirement not met"
            exit 1
          fi
          echo "✅ All required tests passed!"

      - name: 🎉 Success
        run: echo "All quality checks and tests passed successfully!"
