version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: glycogrit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glycogrit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glycogrit123}
      POSTGRES_DB: ${POSTGRES_DB:-glycogrit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glycogrit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: glycogrit-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-glycogrit}:${POSTGRES_PASSWORD:-glycogrit123}@db:5432/${POSTGRES_DB:-glycogrit}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-/app/firebase-credentials.json}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./app:/app/app
      - ./firebase-credentials.json:/app/firebase-credentials.json
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
