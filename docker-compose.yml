version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: glycogrit_db
    environment:
      POSTGRES_DB: glycogrit_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glycogrit_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glycogrit_backend
    environment:
      # Application Settings
      ENVIRONMENT: development
      PORT: 8000
      HOST: 0.0.0.0

      # Database Configuration (using local postgres container)
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/glycogrit_dev

      # Security
      SECRET_KEY: dev-secret-key-change-in-production-12345678901234567890
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080

      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8000

      # Debug
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reload in development
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - glycogrit_network

  # pgAdmin (optional - for database management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: glycogrit_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@glycogrit.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - glycogrit_network
    profiles:
      - tools

networks:
  glycogrit_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
