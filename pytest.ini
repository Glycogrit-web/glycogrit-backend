[pytest]
# Pytest configuration for GlycoGrit Backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=70
    --log-level=WARNING

# Logging configuration to suppress httpcore/httpx debug logs
log_cli = false
log_cli_level = WARNING
log_cli_format = %(levelname)s %(message)s

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, API calls)
    e2e: End-to-end tests (full user flows)
    financial: Critical financial tests (MUST PASS before deployment)
    security: Security-critical tests (MUST PASS before deployment)
    slow: Tests that take more than 1 second
    certificate: Tests for certificate generation system

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
