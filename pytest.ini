[pytest]
# Pytest configuration for GlycoGrit Backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --log-level=WARNING

# Logging configuration to suppress httpcore/httpx debug logs
log_cli = false
log_cli_level = WARNING
log_cli_format = %(levelname)s %(message)s

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, API calls)
    e2e: End-to-end tests (full user flows)
    financial: Critical financial tests (MUST PASS before deployment)
    security: Security-critical tests (MUST PASS before deployment)
    slow: Tests that take more than 1 second
    certificate: Tests for certificate generation system

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
    # Omit non-financial modules from coverage when testing financial code
    app/services/activity_*.py
    app/services/challenge_*.py
    app/services/scheduler.py
    app/services/garmin_service.py
    app/services/instagram_service.py
    app/services/shiprocket*.py
    app/services/storage_service.py
    app/services/fitness_trackers/*
    app/services/progress_validation_service.py
    app/modules/activities/*
    app/modules/challenges/*
    app/modules/certificates/*
    app/modules/fitness_trackers/*
    app/modules/gallery/*
    app/modules/rewards/*
    app/modules/shipping/*
    app/modules/users/*
    app/modules/webhooks/*
    app/background_jobs/*
    app/core/database_monitor.py
    app/core/decorators.py
    app/core/exception_handlers.py
    app/core/interceptors.py
    app/core/oauth_provider_manager.py
    app/core/query_helper.py
    app/core/response_builder.py
    app/core/retry.py
    app/core/webhook_handler.py
    app/core/webhook_security.py
    app/middleware/advanced.py
    app/main.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
